set-option -g prefix C-a

# Use bash
set -g default-shell "/bin/bash"

# Start login bash so ~/.bash_profile → /etc/bashrc → ~/.bashrc all run
# (This avoids missing functions & env drift.)
set-environment -g TERM_PROGRAM "Apple_Terminal"
set -g default-command "/bin/bash -l"

# Start numbering at 1 (nicer for muscle memory)
set -g base-index 1
setw -g pane-base-index 1

# Keep window numbers fixed (don’t renumber when closing)
set -g renumber-windows off
setw -g automatic-rename off

# Default: prefix+1..9 already jumps to window 1..9
# Add optional no-prefix Alt+1..9 jumps:
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

##### Core / Shell #############################################################
# Focus change events (better copy-mode, prompts, etc.)
set -g focus-events on

##### Terminal & Colors ########################################################

# Prefer tmux-256color if your terminfo has it; fallback to screen-256color
set -g default-terminal "tmux-256color"
# Truecolor support (tmux ≥ 3.2 uses terminal-features, older tmux uses overrides)
set -as terminal-features 'tmux-256color:RGB,screen-256color:RGB'

##### Prefix & Window Switching ################################################

##### Vim-style Navigation #####################################################

setw -g mode-keys vi

# Pane focus (vim hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Show pane numbers overlay
bind e display-panes

# Switch to previous session (like cd -)
bind - switch-client -l

# Kill current session and switch to next
bind K run-shell "sstor --kill"

##### Copy / Search Mode #######################################################

# Enter copy-mode with 'a' (was '[')
unbind [
bind a copy-mode

# Vi-like selection
unbind -T copy-mode-vi v
bind   -T copy-mode-vi v send -X begin-selection

# Copy to system clipboard (macOS); reattach no longer needed on modern tmux
unbind -T copy-mode-vi y
bind   -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Paste from system clipboard into tmux buffer, then paste
unbind p
bind p run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

##### Windows / Splits #########################################################

# New window with 'n'
unbind n
bind n new-window

# Splits keep current path
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

##### Resize Keys (with prefix) ################################################

# Free arrow keys for resizing (with prefix)
unbind Left ; unbind Right ; unbind Up ; unbind Down
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

##### History / Performance ####################################################

set -g history-limit 8192
set -s escape-time 0   # reduce Escape delay for faster vi-mode

##### Status / Titles ##########################################################

set -g set-titles on
set -g set-titles-string '#(hostname -s):#I.#P #W #T'

# Basic window styles
set -g window-status-style 'fg=black'
set -g window-status-current-style 'fg=colour232,bold'

set -g status-left-length 20
set -g status-right-length 40
set -g status-right ' #S '

##### Utility Binds ############################################################

# Reload tmux config (prefix + R)
bind R run-shell "tmux source-file ~/.tmux.conf"

# Clear scrollback history in active pane
bind -n C-k clear-history

# Show time / calendar
bind X run-shell "date"
bind C run-shell "cal"

##### App Launchers / Workflows ###############################################

# Vifm
bind V new-window -c "#{pane_current_path}" "vifm ."
bind H run-shell "rm -f ~/.vifm/vifminfo*"

# Dev sessions
bind P run-shell "sstor --project=pocketlab-notebook"
bind S run-shell "sstor --project=sessionator"
bind T run-shell "sstor --project=tenmen"

##### Locking ##################################################################

set -g lock-after-time 300
set -g lock-command vlock
